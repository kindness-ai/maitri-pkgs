name: Build maitri packages

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Rebuild every package from scratch (ignore the published cache)"
        type: boolean
        default: false
  push:
    tags: ['pkgs-*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tooling
        run: |
          # Parallelize pacman's download streams (per-repo DB + build-dep fetches); Arch ships this off
          sed -i 's/^#\?ParallelDownloads.*/ParallelDownloads = 10/' /etc/pacman.conf
          pacman -Syu --noconfirm --needed base-devel git github-cli pacman-contrib
          # Use all cores for compilation (kernel / Rust / native-image builds)
          printf 'MAKEFLAGS="-j%s"\n' "$(nproc)" >> /etc/makepkg.conf

      - name: Prepare builder + import signing key
        run: |
          useradd -m builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          install -d -o builder /work /work/repo
          cp -r pkgbuilds /work/pkgbuilds
          chown -R builder:builder /work
          printf '%s' "${{ secrets.MAITRI_GPG_PRIVATE_KEY }}" | sudo -u builder gpg --batch --import

      - name: Seed build cache from the published release
        if: ${{ github.event.inputs.force_rebuild != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Incremental builds: reuse already-published packages so only changed/new
          # PKGBUILDs recompile. The "stable" release is the cache.
          if gh release download stable -R "${{ github.repository }}" -D /work/repo \
               -p '*.pkg.tar.zst' 2>/dev/null; then
            echo "seeded $(ls /work/repo/*.pkg.tar.zst 2>/dev/null | wc -l) cached packages"
          else
            echo "no published release yet — full build"
          fi
          chown -R builder:builder /work/repo

      - name: Build packages (incremental, dependency-resolving rounds)
        run: |
          printf '\n[maitri-local]\nSigLevel = Never\nServer = file:///work/repo\n' >> /etc/pacman.conf
          install -o builder -m 755 .github/build-packages.sh /work/build-packages.sh
          sudo -u builder bash /work/build-packages.sh "${{ github.event.inputs.force_rebuild }}"

      - name: Sign + assemble + publish to stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo -u builder bash -euo pipefail -c '
            cd /work/repo
            rm -f maitri-local.* maitri.db* maitri.files*
            # GitHub release assets cannot contain ":" (pacman epoch) — rename so
            # the DB %FILENAME% matches the uploaded asset name.
            for f in *:*; do [ -e "$f" ] && mv -- "$f" "${f//:/.}"; done
            # Re-sign every package each run. A rebuilt package overwrites its .pkg, so a
            # stale .sig would otherwise linger and fail verification (BAD signature). Cheap.
            for p in *.pkg.tar.zst; do gpg --batch --yes --detach-sign --no-armor "$p"; done
            repo-add maitri.db.tar.gz *.pkg.tar.zst
            cp --remove-destination maitri.db.tar.gz maitri.db
            cp --remove-destination maitri.files.tar.gz maitri.files
          '
          cd /work/repo
          gh release view stable -R "${{ github.repository }}" >/dev/null 2>&1 \
            || gh release create stable -R "${{ github.repository }}" -t "maitri packages — stable" -n "Rolling maitri package channel."
          gh release upload stable -R "${{ github.repository }}" --clobber \
            maitri.db maitri.db.tar.gz maitri.files maitri.files.tar.gz *.pkg.tar.zst *.sig
