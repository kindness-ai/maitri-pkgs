# nvchecker config for the maitri package repo.
#
# Most packages here mirror an AUR recipe, so the AUR is the actionable baseline:
# "the AUR moved, we should re-sync + rebuild". Those use source = "aur" with
# strip_release = true so the reported version drops the "-pkgrel" and compares
# cleanly against our PKGBUILD pkgver. Packages with no AUR counterpart track their
# upstream Git host directly.
#
# Usage: scripts/check-updates   (seeds versions from the PKGBUILDs, then runs this)
# Manual: nvchecker -c .nvchecker.toml && nvcmp -c .nvchecker.toml
#
# Caveats:
#   - strip_release hides AUR pkgrel-only bumps (rebuilds without a new pkgver).
#   - epoch packages (spotify) report the "epoch:" prefix, so they read as behind
#     even when current — ignore that one line.
#   - GitHub entries are unauthenticated; if you hit rate limits set a keyfile (see
#     https://nvchecker.readthedocs.io and add `keyfile` under [__config__]).

[__config__]
oldver = ".nvchecker/oldver.json"
newver = ".nvchecker/newver.json"

# --- AUR-tracked (section name == AUR pkgbase) -------------------------------
[1password-beta]
source = "aur"
strip_release = true

